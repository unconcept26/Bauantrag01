<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bauantrag OS V8{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% if user %}
  <div class="app-shell">
    <aside class="sidebar">
      <div>
        <div class="brand">Bauantrag <span>OS V8</span></div>
        <div class="subbrand">professionelle Projektakte</div>
      </div>
      <nav class="nav">
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/projects" class="nav-link">Projekte</a>
        <a href="/projects/new" class="nav-link">Neues Projekt</a>
        <a href="/settings" class="nav-link">Einstellungen</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-badge">{{ user.username }}</div>
        <a href="/logout" class="button button-secondary button-block">Logout</a>
      </div>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% else %}
    {% block content %}{% endblock %}
  {% endif %}
  <script src="/static/app.js"></script>
</body>
</html>
